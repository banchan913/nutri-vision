<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutri-Vision 2.0 | AI精密栄養管理</title>
    <link rel="icon" type="image/png" href="src/img/icon.png">
    <link rel="stylesheet" href="src/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- 全ての機能の基盤となる翻訳と辞書 -->
    <script src="src/js/i18n.js"></script>
</head>
<body class="dark-theme">
    <div id="app">
        <!-- サイドナビゲーション -->
        <nav class="side-nav">
            <div class="logo">
                <img src="src/img/icon.png" alt="Logo" style="width: 28px; height: 28px; border-radius: 6px;">
                <span>Nutri<span>Vision</span></span>
            </div>
            <ul class="nav-links">
                <li class="active" data-tab="dashboard"><i class="ph ph-squares-four"></i><span data-i18n="nav_dashboard">ホーム</span></li>
                <li data-tab="calendar"><i class="ph ph-calendar-blank"></i><span data-i18n="nav_calendar">分析</span></li>
                <li data-tab="meal-log"><i class="ph ph-camera"></i><span data-i18n="nav_record">記録</span></li>
                <li data-tab="analysis"><i class="ph ph-chart-line-up"></i><span data-i18n="nav_analysis">トレンド</span></li>
                <li data-tab="history"><i class="ph ph-clock-counter-clockwise"></i><span data-i18n="nav_history">全履歴</span></li>
                <li data-tab="settings"><i class="ph ph-gear"></i><span data-i18n="nav_settings">設定</span></li>
            </ul>
        </nav>

        <main class="content-area">
            <header class="main-header">
                <h1 id="page-title" data-i18n="nav_dashboard">ホーム</h1>
                <div class="header-actions">
                    <button class="btn btn-secondary" id="sync-btn"><i class="ph ph-arrows-clockwise"></i><span data-i18n="btn_sync">同期</span></button>
                    <button class="btn btn-primary" onclick="switchTab('meal-log')"><i class="ph ph-plus-circle"></i><span data-i18n="btn_record">記録開始</span></button>
                </div>
            </header>

            <div id="tab-container">
                <!-- Dashboard Tab -->
                <section id="dashboard-tab" class="tab-pane active">
                    <div class="charts-grid" style="display: grid; grid-template-columns: 1fr; gap: 20px;">
                        <div class="chart-box">
                            <h3 data-i18n="dash_fulfillment_today" style="margin-bottom: 20px;">栄養バランス</h3>
                            <div style="height: 400px;"><canvas id="dashboardNutrientChart"></canvas></div>
                        </div>
                    </div>
                </section>

                <!-- Calendar Tab (期間ボタン連動) -->
                <section id="calendar-tab" class="tab-pane">
                    <div class="segment-selector" id="cal-scope-selector" style="margin-bottom: 20px;">
                        <div class="segment-btn active" data-val="day" data-i18n="cal_scope_day">1日ごと</div>
                        <div class="segment-btn" data-val="week" data-i18n="cal_scope_week">今日から7日間</div>
                        <div class="segment-btn" data-val="month" data-i18n="cal_scope_month">今日から30日間</div>
                    </div>
                    <div id="calendar-analysis-container">
                        <!-- ここにチャートが出現 -->
                    </div>
                </section>

                <!-- Recording Tab (AI写真解析との紐付け) -->
                <section id="meal-log-tab" class="tab-pane">
                    <div class="recording-card" style="text-align: center; padding: 40px;">
                        <input type="file" id="file-input" accept="image/*" hidden>
                        <button class="camera-trigger" onclick="document.getElementById('file-input').click()" style="width: 150px; height: 150px; border-radius: 50%; background: var(--accent-primary); color: white; border: none; font-size: 48px; box-shadow: 0 20px 40px rgba(59, 130, 246, 0.3);">
                            <i class="ph ph-camera"></i>
                        </button>
                        <p style="margin-top: 20px; font-weight: 600;">写真を撮ってAI解析を開始</p>
                    </div>
                </section>
                
                <!-- Settings Tab -->
                <section id="settings-tab" class="tab-pane">
                    <div class="settings-group">
                        <h3 data-i18n="set_prof_title">パーソナルプロフィール</h3>
                        <div id="profile-summary-area" class="profile-summary-card">
                            <!-- JSで流し込む -->
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- AI寄り添うメッセージコンテナ -->
    <div id="ai-message-container"></div>

    <!-- 安定した順序でのスクリプト読み込み -->
    <script src="src/js/sheets.js"></script>
    <script src="src/js/gemini.js"></script>
    <script src="src/js/charts.js"></script>
    <script src="src/js/app.js"></script>
</body>
</html>
