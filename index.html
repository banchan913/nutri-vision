<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutri-Vision 2.0 | AI精密栄養管理</title>
    <link rel="icon" type="image/png" href="src/img/icon.png">
    <link rel="stylesheet" href="src/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- スクリプトの読み込み順を厳格に管理 -->
    <script src="src/js/i18n.js"></script>
</head>
<body class="dark-theme">
    <div id="app">
        <nav class="side-nav">
            <div class="logo">
                <img src="src/img/icon.png" alt="Logo" style="width: 28px; height: 28px; border-radius: 6px;">
                <span>Nutri<span>Vision</span></span>
            </div>
            <ul class="nav-links">
                <li class="active" data-tab="dashboard"><i class="ph ph-squares-four"></i><span data-i18n="nav_dashboard">ホーム</span></li>
                <li data-tab="calendar"><i class="ph ph-calendar-blank"></i><span data-i18n="nav_calendar">カレンダー</span></li>
                <li data-tab="meal-log"><i class="ph ph-camera"></i><span data-i18n="nav_record">記録する</span></li>
                <li data-tab="analysis"><i class="ph ph-chart-line-up"></i><span data-i18n="nav_analysis">トレンド分析</span></li>
                <li data-tab="history"><i class="ph ph-clock-counter-clockwise"></i><span data-i18n="nav_history">全履歴</span></li>
                <li data-tab="settings"><i class="ph ph-gear"></i><span data-i18n="nav_settings">設定</span></li>
            </ul>
            <div class="user-profile" id="user-status">
                <!-- JSで反映 -->
            </div>
        </nav>

        <main class="content-area">
            <header class="main-header">
                <h1 id="page-title" data-i18n="nav_dashboard">ホーム</h1>
                <div class="header-actions">
                    <button class="btn btn-secondary" id="sync-btn"><i class="ph ph-arrows-clockwise"></i><span data-i18n="btn_sync">同期</span></button>
                    <button class="btn btn-primary" id="quick-add-btn"><i class="ph ph-plus-circle"></i><span data-i18n="btn_record">記録</span></button>
                </div>
            </header>

            <div id="tab-container">
                <!-- Dashboard Tab -->
                <section id="dashboard-tab" class="tab-pane active">
                    <div class="charts-container">
                        <div class="chart-box">
                            <h3 data-i18n="dash_fulfillment_today">今日の目標達成状況</h3>
                            <div style="height: 400px;"><canvas id="dashboardNutrientChart"></canvas></div>
                        </div>

                        <!-- 0件時のヒントを表示するエリア（設計に組み込み） -->
                        <div id="dashboard-zero-hint" class="alert tip hidden" style="margin-top: 20px;">
                             <i class="ph ph-sparkle"></i> まだ今日の記録がありません。食事を写真で記録してみましょう！
                        </div>
                    </div>
                </section>

                <!-- Calendar Tab (最新の期間ボタン) -->
                <section id="calendar-tab" class="tab-pane">
                    <div class="segment-selector" id="cal-scope-selector">
                        <div class="segment-btn active" data-val="day" data-i18n="cal_scope_day">日別</div>
                        <div class="segment-btn" data-val="week" data-i18n="cal_scope_week">今日から7日間</div>
                        <div class="segment-btn" data-val="month" data-i18n="cal_scope_month">今日から30日間</div>
                    </div>
                    <div id="calendar-analysis-area">
                        <!-- 集計、グラフ等がここに出現 -->
                    </div>
                </section>
                
                <!-- Settings Tab (昨日の綺麗なプロフィールサマリー) -->
                <section id="settings-tab" class="tab-pane">
                    <div class="settings-group">
                        <h3 data-i18n="set_prof_title">1. プロフィール</h3>
                        <div id="profile-summary-area" class="profile-summary-card">
                            <!-- 昨日の18時時点の優れたサマリーを表示 -->
                        </div>
                        <!-- ... 編集エリア ... -->
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="src/js/sheets.js"></script>
    <script src="src/js/gemini.js"></script>
    <script src="src/js/charts.js"></script>
    <script src="src/js/app.js"></script>
</body>
</html>
