<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutri-Vision 2.0 | AI精密栄養管理</title>
    <link rel="icon" type="image/png" href="src/img/icon.png">
    <link rel="stylesheet" href="src/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="src/js/i18n.js"></script>
</head>
<body class="dark-theme">
    <div id="app">
        <nav class="side-nav">
            <div class="logo">
                <img src="src/img/icon.png" alt="Logo" style="width: 28px; height: 28px; border-radius: 6px;">
                <span>Nutri<span>Vision</span></span>
            </div>
            <ul class="nav-links">
                <li class="active" data-tab="dashboard"><i class="ph ph-squares-four"></i><span data-i18n="nav_dashboard">ホーム</span></li>
                <li data-tab="calendar"><i class="ph ph-calendar-blank"></i><span data-i18n="nav_calendar">カレンダー</span></li>
                <li data-tab="meal-log"><i class="ph ph-camera"></i><span data-i18n="nav_record">記録する</span></li>
                <li data-tab="analysis"><i class="ph ph-chart-line-up"></i><span data-i18n="nav_analysis">トレンド分析</span></li>
                <li data-tab="history"><i class="ph ph-clock-counter-clockwise"></i><span data-i18n="nav_history">全履歴</span></li>
                <li data-tab="settings"><i class="ph ph-gear"></i><span data-i18n="nav_settings">設定</span></li>
            </ul>
        </nav>

        <main class="content-area">
            <header class="main-header">
                <h1 id="page-title" data-i18n="nav_dashboard">ホーム</h1>
            </header>

            <div id="tab-container">
                <!-- Dashboard Tab -->
                <section id="dashboard-tab" class="tab-pane active">
                    <div class="charts-container">
                        <div class="chart-box">
                            <h3 data-i18n="dash_fulfillment_today">今日の目標達成状況</h3>
                            <div style="height: 400px;"><canvas id="dashboardNutrientChart"></canvas></div>
                        </div>
                    </div>
                </section>

                <!-- Calendar Tab -->
                <section id="calendar-tab" class="tab-pane">
                    <div class="segment-selector" id="cal-scope-selector" style="margin-bottom: 20px;">
                        <div class="segment-btn active" data-val="day" data-i18n="cal_scope_day">1日ごと</div>
                        <div class="segment-btn" data-val="week" data-i18n="cal_scope_week">1週間（合計）</div>
                        <div class="segment-btn" data-val="month" data-i18n="cal_scope_month">1ヶ月（合計）</div>
                    </div>
                    <div id="cal-charts-container" class="charts-container" style="display: none; flex-direction: column; gap: 20px; margin-bottom: 20px;">
                        <div class="chart-box" style="padding: 15px;">
                            <div style="height: 200px;"><canvas id="calPfcChart"></canvas></div>
                        </div>
                        <div class="chart-box" style="padding: 15px;">
                            <div style="height: 350px;"><canvas id="calNutrientChart"></canvas></div>
                        </div>
                    </div>
                </section>

                <!-- Meal Log Tab (Missing elements here!) -->
                <section id="meal-log-tab" class="tab-pane">
                    <div class="recording-area">
                        <input type="file" id="file-input" accept="image/*" hidden>
                        <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">
                            <i class="ph ph-camera"></i> <span>写真を解析する</span>
                        </button>
                        <div id="image-preview-container" class="hidden">
                            <img id="image-preview" src="" alt="Preview">
                        </div>
                    </div>
                </section>

                <!-- Settings Tab -->
                <section id="settings-tab" class="tab-pane">
                    <div class="settings-group">
                        <h3 data-i18n="set_prof_title">プロフィール</h3>
                        <!-- 昨日のサマリー表示 (ID: profile-summary-area) -->
                        <div id="profile-summary-area" class="profile-summary-card"></div>
                        
                        <!-- 編集エリア (IDs for app.js) -->
                        <div id="profile-edit-area" style="display: none; flex-direction: column; gap: 15px;">
                            <input type="number" id="profile-age">
                            <input type="number" id="profile-height">
                            <input type="number" id="profile-weight">
                            <input type="hidden" id="profile-gender">
                            <input type="hidden" id="profile-pal">
                            <!-- セグメントセレクターID -->
                            <div id="profile-gender-selector" class="profile-options"></div>
                            <div id="profile-pal-selector" class="profile-options"></div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- 寄り添うスタッフのメッセージコンテナ -->
    <div id="ai-message-container"></div>

    <script src="src/js/sheets.js"></script>
    <script src="src/js/gemini.js"></script>
    <script src="src/js/charts.js"></script>
    <script src="src/js/app.js"></script>
</body>
</html>
